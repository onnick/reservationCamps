name: ci

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports
            target/failsafe-reports

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/onnick/reservationcamps:${{ github.sha }}
            ghcr.io/onnick/reservationcamps:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Install kind
        uses: helm/kind-action@v1

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Prepare secrets
        run: |
          cat > k8s/overlays/staging/secret.env << 'EOF'
          DB_USERNAME=${{ secrets.STAGING_DB_USERNAME }}
          DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}
          EOF

      - name: Deploy to staging
        run: |
          cd k8s/overlays/staging
          kustomize edit set image reservationcamps=ghcr.io/onnick/reservationcamps:${{ github.sha }}
          kubectl apply -k .
          kubectl -n staging rollout status deploy/postgres --timeout=120s
          kubectl -n staging rollout status deploy/reservationcamps --timeout=180s

      - name: Smoke test
        run: |
          kubectl -n staging port-forward svc/reservationcamps 8080:80 &
          PF_PID=$!
          sleep 3
          curl -fsS http://localhost:8080/actuator/health
          kill $PF_PID

