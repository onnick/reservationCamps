services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reservationcamps
      POSTGRES_USER: reservationcamps
      POSTGRES_PASSWORD: reservationcamps
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservationcamps -d reservationcamps"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/reservationcamps
      DB_USERNAME: reservationcamps
      DB_PASSWORD: reservationcamps
    ports:
      - "8080:8080"

volumes:
  db-data:
