server:
  port: 8081

spring:
  datasource:
    # Use file-based H2 so data survive app restart (stored under ./data/).
    url: jdbc:h2:file:./data/reservationcamps;MODE=PostgreSQL;DATABASE_TO_UPPER=false;CASE_INSENSITIVE_IDENTIFIERS=true
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    locations: classpath:db/migration/h2
  jpa:
    hibernate:
      ddl-auto: validate

# Create a local ADMIN user on startup (if it doesn't exist).
bootstrap:
  admin:
    email: admin@admin.cz
    # Doporučení: nenechávat hesla v repozitáři. Nastav přes env:
    # BOOTSTRAP_ADMIN_PASSWORD=admin
    password:

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
