server:
  port: 8081

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/reservationcamps}
      auto-index-creation: true

# Create a local ADMIN user on startup (if it doesn't exist).
bootstrap:
  admin:
    email: admin@admin.cz
    # Doporučení: nenechávat hesla v repozitáři. Nastav přes env:
    # BOOTSTRAP_ADMIN_PASSWORD=admin
    password:

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
