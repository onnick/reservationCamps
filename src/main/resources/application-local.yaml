server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:reservationcamps;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false;CASE_INSENSITIVE_IDENTIFIERS=true
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    locations: classpath:db/migration/h2
  jpa:
    hibernate:
      ddl-auto: validate
