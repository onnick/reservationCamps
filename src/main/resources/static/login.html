<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Přihlášení</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body class="page-login">
    <div class="grain"></div>
    <header>
      <div class="wrap">
        <div class="hero">
          <div class="topline">
            <div class="brand">
              <h1>Přihlášení</h1>
              <span class="pill" id="baseUrlPill"></span>
            </div>
            <div class="topActions">
              <nav class="navTabs" aria-label="Navigace">
                <a class="pill" href="/app">Rezervace</a>
                <a class="pill active" href="/login">Přihlášení</a>
                <a class="pill" href="/admin">Administrace</a>
              </nav>
            </div>
          </div>
          <p class="sub">
            Přihlaste se a uvidíte seznam vašich rezervací. Pokud jste admin, přesměrujeme vás na správu rezervací.
          </p>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="grid">
        <section class="card">
          <h2>Účet</h2>
          <div>
            <label for="email">Email</label>
            <input id="email" inputmode="email" placeholder="např. jana.novakova@example.com" />
          </div>
          <div class="sp10"></div>
          <div>
            <label for="password">Heslo</label>
            <input id="password" type="password" autocomplete="current-password" placeholder="min. 5 znaků" />
          </div>
          <div class="actions">
            <button type="button" id="loginBtn">Přihlásit</button>
            <button type="button" class="secondary" id="logoutBtn">Odhlásit</button>
          </div>
          <div class="hint">Pokud účet neexistuje, založte ho v aplikaci pro rezervace.</div>
          <div class="hint mono">Uživatel: <span id="userIdText">—</span></div>
        </section>

        <section class="card">
          <h2>Moje rezervace</h2>
          <div id="grid"></div>
          <div class="hint hidden" id="emptyHint">Zatím nemáte žádné rezervace.</div>
        </section>
      </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
      document.getElementById("baseUrlPill").textContent = window.location.origin;

      const toastRoot = document.getElementById("toast");
      const grid = document.getElementById("grid");
      const emptyHint = document.getElementById("emptyHint");
      const userIdText = document.getElementById("userIdText");

      const LS = { userId: "rc_login_user_id", email: "rc_login_email" };
      const state = { userId: null };

      function toast(kind, msg, meta) {
        const el = document.createElement("div");
        el.className = `t ${kind || ""}`.trim();
        el.innerHTML = `<div class="k"></div><div class="m"></div>`;
        el.querySelector(".k").textContent = meta ? meta : "reservationCamps";
        el.querySelector(".m").textContent = msg;
        toastRoot.prepend(el);
        window.setTimeout(() => el.remove(), 5200);
      }

      async function request(method, path, body) {
        const headers = { "Content-Type": "application/json" };
        const init = { method, headers };
        if (body !== undefined) init.body = JSON.stringify(body);
        const res = await fetch(path, init);
        const contentType = res.headers.get("content-type") || "";
        const isJson = contentType.includes("application/json");
        const data = isJson ? await res.json() : await res.text();
        if (!res.ok) throw { status: res.status, data };
        return data;
      }

      function niceError(e) {
        if (!e) return "Nastala chyba.";
        if (typeof e === "string") return e;
        if (e.data && typeof e.data === "object" && e.data.message) return e.data.message;
        if (e.data && typeof e.data === "string") return e.data;
        return `Nastala chyba${e.status ? ` (HTTP ${e.status})` : ""}.`;
      }

      function setUserId(userId) {
        state.userId = userId || null;
        userIdText.textContent = state.userId || "—";
        if (state.userId) localStorage.setItem(LS.userId, state.userId);
        else localStorage.removeItem(LS.userId);
      }

      function statusClass(s) {
        if (s === "PAID") return "good";
        if (s === "CANCELLED") return "bad";
        return "";
      }

      function render(items) {
        grid.innerHTML = "";
        if (!items || !items.length) {
          emptyHint.classList.remove("hidden");
          return;
        }
        emptyHint.classList.add("hidden");
        const wrap = document.createElement("div");
        wrap.className = "resGridWrap";
        const t = document.createElement("table");
        t.className = "resGrid";
        t.innerHTML = `
          <thead>
            <tr>
              <th>Tábor</th>
              <th>Od</th>
              <th>Do</th>
              <th>Stav</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;
        const body = t.querySelector("tbody");
        for (const r of items) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${r.campName || "—"}</td>
            <td>${r.startDate || "—"}</td>
            <td>${r.endDate || "—"}</td>
            <td class="cell-status"><span class="status ${statusClass(r.status)}">${r.status}</span></td>
          `;
          body.appendChild(tr);
        }
        wrap.appendChild(t);
        grid.appendChild(wrap);
      }

      async function loadReservations() {
        if (!state.userId) {
          render([]);
          return;
        }
        try {
          const data = await request("GET", `/api/users/${encodeURIComponent(state.userId)}/reservations`);
          if (!Array.isArray(data)) {
            render([]);
            return;
          }
          render(
            data.map((r) => ({
              id: r.id,
              campName: r.campName,
              startDate: r.startDate,
              endDate: r.endDate,
              status: r.status,
            }))
          );
        } catch (e) {
          toast("bad", niceError(e), "rezervace");
          render([]);
        }
      }

      async function login() {
        const email = (document.getElementById("email").value || "").trim().toLowerCase();
        const password = document.getElementById("password").value || "";
        if (!email) {
          toast("bad", "Zadejte email.", "přihlášení");
          return;
        }
        if (!password) {
          toast("bad", "Zadejte heslo.", "přihlášení");
          return;
        }
        try {
          const res = await request("POST", "/api/users/login", { email, password });
          setUserId(res && res.id ? res.id : null);
          localStorage.setItem(LS.email, email);
          toast("good", "Přihlášení proběhlo.", "přihlášení");
          await loadReservations();
        } catch (e) {
          toast("bad", niceError(e), "přihlášení");
        }
      }

      function logout() {
        setUserId(null);
        toast("good", "Odhlášeno.", "přihlášení");
        render([]);
      }

      document.getElementById("loginBtn").addEventListener("click", login);
      document.getElementById("logoutBtn").addEventListener("click", logout);

      // Restore from localStorage
      const savedUserId = localStorage.getItem(LS.userId);
      const savedEmail = localStorage.getItem(LS.email);
      if (savedEmail) document.getElementById("email").value = savedEmail;
      if (savedUserId) setUserId(savedUserId);
      loadReservations();
    </script>
  </body>
</html>
