server:
  port: 8080

spring:
  application:
    name: reservation-camps
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/reservationcamps}
      auto-index-creation: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
