apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - namespace.yaml
  - ../../base

secretGenerator:
  - name: reservationcamps-secrets
    envs:
      - secret.env

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: reservationcamps
    newName: ghcr.io/onnick/reservationcamps
    newTag: latest

